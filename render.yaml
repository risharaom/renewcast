services:
  - type: web
    name: renewcast-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*" # tighten to your deployed frontend URL once you have one
      # Only needed if you have NOT committed backend/data/energy.csv:
      # - key: KAGGLE_USERNAME
      #   sync: false
      # - key: KAGGLE_KEY
      #   sync: false
